---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        template IN AAAA {
           rcode NOERROR
        }
        prometheus :9153
        # Forward external queries directly to NextDNS profile dedicated IPs.
        # We cannot use /etc/resolv.conf here because the host resolver points
        # at 127.0.0.53 (systemd-resolved stub), which is unreachable from a
        # pod's network namespace and breaks all external DNS.
        forward . 45.90.28.167 45.90.30.167 {
           max_concurrent 1000
        }
        cache 30
        loop
        reload
        loadbalance
    }
