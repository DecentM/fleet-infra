apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager-system
spec:
  interval: 10m
  releaseName: trust-manager
  chart:
    spec:
      chart: trust-manager
      version: v0.22.1
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    crds:
      enabled: true
    app:
      trust:
        namespace: cert-manager-system
