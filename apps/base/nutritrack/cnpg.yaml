apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nutritrack-db
  namespace: app-nutritrack
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.10
  storage:
    storageClass: longhorn-local
    size: 10Gi
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: nutritrack
      owner: nutritrack
