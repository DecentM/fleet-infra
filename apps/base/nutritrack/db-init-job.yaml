apiVersion: batch/v1
kind: Job
metadata:
  name: nutritrack-db-init
  namespace: app-nutritrack
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          # Migrator image (pnpm + tsx + full source), built from the
          # `migrator` target of containers/nutritrack/Dockerfile.
          # The main runner image is a Next.js standalone bundle with only
          # `node server.js` — it has no pnpm/tsx and can't run the scripts.
          image: ghcr.io/decentm/nutritrack-migrator:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - pnpm db:migrate && pnpm db:seed
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutritrack-db-app
                  key: uri
