apiVersion: batch/v1
kind: Job
metadata:
  name: nutritrack-db-init
  namespace: app-nutritrack
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          # Same image as the main app — must be built and pushed first
          image: ghcr.io/sderosiaux/nutritrack:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - pnpm db:migrate && pnpm db:seed
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutritrack-db-app
                  key: uri
