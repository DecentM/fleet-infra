apiVersion: apps/v1
kind: Deployment
metadata:
  name: nutritrack
  namespace: app-nutritrack
  labels:
    app: nutritrack
spec:
  revisionHistoryLimit: 2
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nutritrack
  template:
    metadata:
      labels:
        app: nutritrack
    spec:
      containers:
        - name: nutritrack
          # Built by this repo's CI from containers/nutritrack/Dockerfile,
          # which clones upstream (https://github.com/sderosiaux/nutritrack)
          # at a pinned ref and builds the Next.js 15 standalone output.
          # TODO: pin to a specific sha-XXXXXXX tag instead of :latest.
          image: ghcr.io/decentm/nutritrack:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 20
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          envFrom:
            - configMapRef:
                name: nutritrack-config
          env:
            # CNPG generates the `nutritrack-db-app` secret. The `uri` key
            # is the full libpq connection string pointing at the -rw service.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nutritrack-db-app
                  key: uri
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: nutritrack-secrets
                  key: better-auth-secret
            # B2 S3-compatible storage credentials (MinIO SDK env var names)
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: nutritrack-secrets
                  key: b2-endpoint
            - name: MINIO_BUCKET
              valueFrom:
                secretKeyRef:
                  name: nutritrack-secrets
                  key: b2-bucket
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nutritrack-secrets
                  key: b2-access-key-id
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nutritrack-secrets
                  key: b2-secret-access-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nutritrack-secrets
                  key: openai-api-key
---
apiVersion: v1
kind: Service
metadata:
  name: nutritrack
  namespace: app-nutritrack
spec:
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app: nutritrack
