apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-redis
  namespace: app-dawarich
  labels:
    app: dawarich-redis
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: dawarich-redis
  template:
    metadata:
      labels:
        app: dawarich-redis
    spec:
      nodeSelector:
        kubernetes.io/hostname: cadance
      containers:
        - name: redis
          image: redis:7.4-alpine
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - mountPath: /data
              name: redisdata
          ports:
            - containerPort: 6379
              name: redis
        - name: exporter
          image: oliver006/redis_exporter:v1.80.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
          ports:
            - containerPort: 9121
              name: metrics
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: redisdata
          hostPath:
            path: /mnt/spike/storage/k8s/namespaces/app-dawarich/broker/redisdata
            type: DirectoryOrCreate
      dnsConfig:
        options:
          - name: ndots
            value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: dawarich-redis
  namespace: app-dawarich
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    app: dawarich-redis
---
apiVersion: v1
kind: Service
metadata:
  name: dawarich-redis-metrics
  namespace: app-dawarich
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9121"
spec:
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
  selector:
    app: dawarich-redis
