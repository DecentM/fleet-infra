              value: "5432"
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: dawarich-db-app
                  key: dbname
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dawarich-db-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dawarich-db-app
                  key: password
            - name: SMTP_SERVER
              valueFrom:
                secretKeyRef:
                  name: dawarich-smtp-secrets
                  key: SMTP_SERVER
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: dawarich-smtp-secrets
                  key: SMTP_PORT
            - name: SMTP_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: dawarich-smtp-secrets
                  key: SMTP_DOMAIN
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dawarich-smtp-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dawarich-smtp-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: dawarich-smtp-secrets
                  key: SMTP_FROM
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: dawarich-secrets
                  key: SECRET_KEY_BASE
            - name: OIDC_ISSUER
              value: "https://auth.borooka.ee"
            - name: OIDC_CLIENT_ID
              value: "dawarich"
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dawarich-oidc-secrets
                  key: client-secret
            - name: OIDC_REDIRECT_URI
              value: "https://location.borooka.ee/users/auth/openid_connect/callback"
            - name: OIDC_PROVIDER_NAME
              value: "Authelia"
            - name: OIDC_PKCE_ENABLED
              value: "true"
            - name: ALLOW_EMAIL_PASSWORD_REGISTRATION
              value: "false"
            - name: ALLOW_EMAIL_PASSWORD_LOGIN
              value: "false"
            - name: BACKGROUND_PROCESSING_CONCURRENCY
              value: "3"
          volumeMounts:
            - name: dawarich-public
              mountPath: /var/app/public
            - name: dawarich-watched
              mountPath: /var/app/tmp/imports/watched
            - name: dawarich-storage
              mountPath: /var/app/storage
      volumes:
