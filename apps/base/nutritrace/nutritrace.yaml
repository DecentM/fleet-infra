apiVersion: apps/v1
kind: Deployment
metadata:
  name: nutritrace
  namespace: app-nutritrace
  labels:
    app: nutritrace
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: nutritrace
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nutritrace
    spec:
      nodeSelector:
        kubernetes.io/hostname: cadance
      terminationGracePeriodSeconds: 30
      containers:
        - name: nutritrace
          image: ghcr.io/traceapps/nutritrace:1.0.2
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 2Gi
          # startup probe waits for just the port to open cause nutritrace
          # response 503 until the first user has been created
          startupProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 20
          envFrom:
            - configMapRef:
                name: nutritrace-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nutritrace-secrets
                  key: JWT_SECRET
            - name: TOKEN_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: nutritrace-secrets
                  key: TOKEN_ENC_KEY
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nutritrace-oidc-secrets
                  key: client-secret
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nutritrace-ai-secrets
                  key: AI_API_KEY
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: nutritrace-smtp-secrets
                  key: SMTP_HOST
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: nutritrace-smtp-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: nutritrace-smtp-secrets
                  key: SMTP_PASS
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: nutritrace-smtp-secrets
                  key: SMTP_FROM
          ports:
            - containerPort: 3001
              name: http
          volumeMounts:
            - name: nutritrace-db
              mountPath: /data/db
            - name: nutritrace-uploads
              mountPath: /data/uploads
            - name: nutritrace-off-mirror
              mountPath: /data/off-mirror
      volumes:
        - name: nutritrace-db
          persistentVolumeClaim:
            claimName: nutritrace-db
        - name: nutritrace-uploads
          persistentVolumeClaim:
            claimName: nutritrace-uploads
        - name: nutritrace-off-mirror
          persistentVolumeClaim:
            claimName: nutritrace-off-mirror
      dnsConfig:
        options:
          - name: ndots
            value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: nutritrace
  namespace: app-nutritrace
spec:
  ports:
    - name: http
      port: 3001
      targetPort: http
  selector:
    app: nutritrace
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nutritrace-db
  namespace: app-nutritrace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn-local
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nutritrace-uploads
  namespace: app-nutritrace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn-local
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nutritrace-off-mirror
  namespace: app-nutritrace
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: longhorn-local
