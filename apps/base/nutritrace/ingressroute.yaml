apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nutritrace
  namespace: app-nutritrace
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nutritrace.cluster.arpa`)
      kind: Rule
      services:
        - name: nutritrace
          namespace: app-nutritrace
          port: http
  tls:
    secretName: traefik-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-cert
  namespace: app-nutritrace
spec:
  secretName: traefik-tls
  duration: 672h
  renewBefore: 168h
  issuerRef:
    name: custom-ca-cluster-issuer
    kind: ClusterIssuer
  commonName: "nutritrace.cluster.arpa"
  dnsNames:
    - "nutritrace.cluster.arpa"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-ingress-controller
  namespace: app-nutritrace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
  - kind: ServiceAccount
    name: traefik-ingress-controller
    namespace: traefik-system
