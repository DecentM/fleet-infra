apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: supernote-decentm
  namespace: app-supernote
subjects:
  - name: supernote
    spec:
      fqdn: supernote.decentm.com
      protocol: http
      target: http://traefik.traefik-system.svc:8000
tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-decentm
---
# Traffic path: Cloudflare → Tunnel → Traefik (tunnel entrypoint) → authelia-forwardauth → app.
# Authelia forward-auth works here because the tunnel terminates at Traefik,
# which applies middlewares before proxying to the upstream service.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supernote-public
  namespace: app-supernote
spec:
  entryPoints:
    - tunnel
  routes:
    - match: Host(`supernote.decentm.com`)
      kind: Rule
      middlewares:
        - name: authelia-forwardauth
          namespace: app-authelia
      services:
        - name: supernote
          port: http
