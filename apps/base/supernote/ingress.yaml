apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: supernote-decentm
  namespace: app-supernote
subjects:
  - name: supernote-frontend
    spec:
      fqdn: supernote.decentm.com
      protocol: http
      target: http://traefik.traefik-system.svc:8000
tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-decentm
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: supernote-transport
  namespace: app-supernote
spec:
  forwardingTimeouts:
    dialTimeout: 60s
    responseHeaderTimeout: 120s
    idleConnTimeout: 90s
  maxIdleConnsPerHost: 16
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: supernote-transport-sync
  namespace: app-supernote
spec:
  forwardingTimeouts:
    dialTimeout: 60s
    responseHeaderTimeout: 3600s
    idleConnTimeout: 3600s
  maxIdleConnsPerHost: 16
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: supernote-forwarded-headers
  namespace: app-supernote
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: https
      X-Forwarded-Port: "443"
---
# Blocks requests by allowing only loopback. Any request coming through the
# tunnel will have a real source IP and get a 403.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: supernote-block-registration
  namespace: app-supernote
spec:
  ipAllowList:
    sourceRange:
      - 127.0.0.1/32
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supernote-public
  namespace: app-supernote
spec:
  entryPoints:
    - tunnel
  routes:
    # socket.io - WebSocket auto-sync, highest priority
    - match: Host(`supernote.decentm.com`) && PathPrefix(`/socket.io/`)
      kind: Rule
      priority: 30
      middlewares:
        - name: supernote-forwarded-headers
          namespace: app-supernote
      services:
        - name: supernote-sync
          port: http
          serversTransport: supernote-transport-sync

    # Block registration endpoints - no public registration allowed.
    # Higher priority than the /api/ catch-all so these match first.
    - match: Host(`supernote.decentm.com`) && (Path(`/api/user/register`) || Path(`/api/user/mail/validcode`))
      kind: Rule
      priority: 25
      middlewares:
        - name: supernote-block-registration
          namespace: app-supernote
        - name: supernote-forwarded-headers
          namespace: app-supernote
      services:
        - name: supernote-api
          port: http
          serversTransport: supernote-transport

    # Java API backend
    - match: Host(`supernote.decentm.com`) && PathPrefix(`/api/`)
      kind: Rule
      priority: 20
      middlewares:
        - name: supernote-forwarded-headers
          namespace: app-supernote
      services:
        - name: supernote-api
          port: http
          serversTransport: supernote-transport

    # Node.js frontend catch-all
    - match: Host(`supernote.decentm.com`)
      kind: Rule
      priority: 10
      services:
        - name: supernote-frontend
          port: http
          serversTransport: supernote-transport
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-ingress-controller
  namespace: app-supernote
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
  - kind: ServiceAccount
    name: traefik-ingress-controller
    namespace: traefik-system
