apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: supernote-decentm
  namespace: app-supernote
subjects:
  - name: supernote-service
    spec:
      fqdn: supernote.decentm.com
      protocol: http
      target: http://traefik.traefik-system.svc:8000
tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-decentm
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supernote-public
  namespace: app-supernote
spec:
  entryPoints:
    - tunnel
  routes:
    - match: Host(`supernote.decentm.com`)
      kind: Rule
      services:
        - name: supernote-service
          port: http
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-ingress-controller
  namespace: app-supernote
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
  - kind: ServiceAccount
    name: traefik-ingress-controller
    namespace: traefik-system
