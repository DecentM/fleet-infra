apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: supernote-decentm
  namespace: app-supernote
subjects:
  - name: supernote
    spec:
      fqdn: supernote.decentm.com
      protocol: http
      target: http://traefik.traefik-system.svc:8000
tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-decentm
---
# Traffic path: Cloudflare → Tunnel → Traefik (tunnel entrypoint) → middlewares → app.
# supernote-https-scheme sets X-Forwarded-Proto: https before the forward-auth check,
# since cloudflared sends plain HTTP to Traefik's tunnel entrypoint.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: supernote-https-scheme
  namespace: app-supernote
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: https
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-forwardauth
  namespace: app-supernote
spec:
  forwardAuth:
    address: http://authelia.app-authelia.svc:9091/api/authz/forward-auth?authelia_url=https://auth.decentm.com
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Email
      - Remote-Name
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: supernote-public
  namespace: app-supernote
spec:
  entryPoints:
    - tunnel
  routes:
    - match: Host(`supernote.decentm.com`)
      kind: Rule
      middlewares:
        - name: supernote-https-scheme
          namespace: app-supernote
        - name: authelia-forwardauth
          namespace: app-supernote
      services:
        - name: supernote
          port: http
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-ingress-controller
  namespace: app-supernote
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
  - kind: ServiceAccount
    name: traefik-ingress-controller
    namespace: traefik-system
