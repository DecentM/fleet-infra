apiVersion: apps/v1
kind: Deployment

metadata:
  name: openclaw
  namespace: app-openclaw

spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Copy config from ConfigMap to PVC if it doesn't exist
              # Uses cat+redirection instead of cp because busybox cp can fail silently
              # with configmap symlinks
              if [ ! -f /data/openclaw.json ]; then
                echo "Config file not found, copying from ConfigMap..."
                cat /config-template/openclaw.json > /data/openclaw.json
                if [ -s /data/openclaw.json ]; then
                  echo "Config copied successfully ($(wc -c < /data/openclaw.json) bytes)"
                else
                  echo "ERROR: Config file is empty after copy!"
                  exit 1
                fi
              else
                echo "Config file exists, preserving existing config"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config-template
              mountPath: /config-template
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.12
          imagePullPolicy: IfNotPresent
          command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 5
            failureThreshold: 20
          env:
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENROUTER_API_KEY
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: MATRIX_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATRIX_ACCESS_TOKEN
            - name: MATRIX_HOMESERVER_URL
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATRIX_HOMESERVER_URL
            - name: MATRIX_USER_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: MATRIX_USER_ID
          ports:
            - containerPort: 18789
              name: http
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: config-template
          configMap:
            name: openclaw-config
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: app-openclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn-local
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: app-openclaw

spec:
  ports:
    - name: http
      port: 18789
      targetPort: http
  selector:
    app: openclaw
