apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: ntfy-transport
  namespace: app-ntfy
spec:
  forwardingTimeouts:
    # SSE connections are long-lived - disable response header timeout so
    # Traefik does not close the stream while waiting for the first event.
    responseHeaderTimeout: 0s
    idleConnTimeout: 120s
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ntfy-public
  namespace: app-ntfy
spec:
  entryPoints:
    - tunnel
  routes:
    # Priority 10 - SSO-protected web UI routes, matched first
    - match: "Host(`ntfy.decentm.com`) && (Path(`/`) || PathPrefix(`/app.html`) || PathPrefix(`/static`) || PathPrefix(`/sw.js`) || PathPrefix(`/manifest.webmanifest`) || PathPrefix(`/config.js`) || PathPrefix(`/docs`) || Path(`/account`) || Path(`/settings`) || Path(`/login`) || Path(`/signup`))"
      kind: Rule
      priority: 10
      middlewares:
        - name: authelia-forwardauth
          namespace: app-authelia
      services:
        - name: ntfy
          port: http
    # Priority 1 - open API/client routes, catch-all
    - match: Host(`ntfy.decentm.com`)
      kind: Rule
      priority: 1
      services:
        - name: ntfy
          port: http
          serversTransport: ntfy-transport
---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: ntfy-tunnel
  namespace: app-ntfy
subjects:
  - name: ntfy
    spec:
      fqdn: ntfy.decentm.com
      protocol: http
      target: http://traefik.traefik-system.svc:8000
tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-decentm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-ingress-controller
  namespace: app-ntfy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
  - kind: ServiceAccount
    name: traefik-ingress-controller
    namespace: traefik-system
