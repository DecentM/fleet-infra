apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ntfy
  namespace: app-ntfy

spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`ntfy.cluster.arpa`)
      kind: Rule
      services:
        - name: ntfy
          port: http
  tls:
    secretName: ntfy-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ntfy-tls
  namespace: app-ntfy
spec:
  secretName: ntfy-tls
  duration: 672h # 28d
  renewBefore: 168h # 7d
  issuerRef:
    name: custom-ca-cluster-issuer
    kind: ClusterIssuer
  commonName: "ntfy.cluster.arpa"
  dnsNames:
    - "ntfy.cluster.arpa"
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: ntfy-transport
  namespace: app-ntfy
spec:
  forwardingTimeouts:
    # SSE connections are long-lived — disable response header timeout so
    # Traefik does not close the stream while waiting for the first event.
    responseHeaderTimeout: 0s
    idleConnTimeout: 120s
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ntfy-public
  namespace: app-ntfy
spec:
  entryPoints:
    - tunnel
  routes:
    - match: Host(`ntfy.decentm.com`)
      kind: Rule
      services:
        - name: ntfy
          port: http
          serversTransport: ntfy-transport
---
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: ntfy-tunnel
  namespace: app-ntfy
subjects:
  - name: ntfy
    spec:
      fqdn: ntfy.decentm.com
      protocol: http
      target: http://traefik.traefik-system.svc:8000
tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-decentm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: traefik-ingress-controller
  namespace: app-ntfy

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-ingress-controller
subjects:
  - kind: ServiceAccount
    name: traefik-ingress-controller
    namespace: traefik-system
