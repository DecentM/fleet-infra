apiVersion: apps/v1
kind: Deployment

metadata:
  name: qbittorrent
  namespace: app-servarr

spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: Recreate
  replicas: 0
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      nodeSelector:
        kubernetes.io/hostname: cadance
      hostNetwork: true
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
      initContainers:
        - name: qbt-write-config
          image: docker.io/library/busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /config/qBittorrent
              cat > /config/qBittorrent/qBittorrent.conf << EOF
              [AutoRun]
              enabled=false
              program=

              [LegalNotice]
              Accepted=true

              [Preferences]
              Connection\UPnP=false
              Connection\PortRangeMin=${QBT_TORRENTING_PORT}
              Downloads\SavePath=${QBT_SAVE_PATH}/
              Downloads\TempPath=${QBT_SAVE_PATH}/incomplete/
              Downloads\ScanDirsV2=@Variant(\0\0\0\x1c\0\0\0\0)
              WebUI\Address=*
              WebUI\ServerDomains=*
              WebUI\BannedIPs=
              WebUI\LocalHostAuth=false
              WebUI\AuthSubnetWhitelistEnabled=true
              WebUI\AuthSubnetWhitelist=${QBT_AUTH_SUBNET_WHITELIST}
              EOF
              chmod 444 /config/qBittorrent/qBittorrent.conf
          env:
            - name: QBT_TORRENTING_PORT
              valueFrom:
                configMapKeyRef:
                  name: qbittorrent-config
                  key: TORRENTING_PORT
            - name: QBT_SAVE_PATH
              valueFrom:
                configMapKeyRef:
                  name: qbittorrent-config
                  key: SAVE_PATH
            - name: QBT_AUTH_SUBNET_WHITELIST
              valueFrom:
                configMapKeyRef:
                  name: qbittorrent-config
                  key: AUTH_SUBNET_WHITELIST
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.1.4
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 20m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 20
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 40
            timeoutSeconds: 40
            failureThreshold: 4
          ports:
            - containerPort: 30688
              name: torrent
            - containerPort: 8081
              name: http
          env:
            - name: HOME
              value: /config
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Tallinn"
            - name: WEBUI_PORT
              value: "8081"
            - name: TORRENTING_PORT
              value: "30688"
            # From `qbittorrent --help`
            - name: QBT_NO_SPLASH
              value: "true"
            - name: QBT_SAVE_PATH
              value: "/downloads"
            - name: QBT_PROFILE
              value: "/config"
          volumeMounts:
            - name: downloads
              mountPath: /downloads
            - name: config
              mountPath: /config

      volumes:
        - name: downloads
          hostPath:
            path: /mnt/spike/mass-storage/downloads
            type: Directory
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: home.arpa/zfs-pool
                    operator: In
                    values:
                      - "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config
  namespace: app-servarr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn-local
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-web
  namespace: app-servarr

spec:
  ports:
    - name: http
      port: 8081
      targetPort: http
  selector:
    app: qbittorrent
