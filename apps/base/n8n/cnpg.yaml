apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-db
  namespace: app-n8n
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.13
  storage:
    storageClass: longhorn-local
    size: 5Gi
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: n8n
      owner: n8n
