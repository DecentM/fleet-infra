apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anytype-consensusnode-networkstore
  namespace: app-anytype
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-local
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anytype-consensusnode
  namespace: app-anytype
  labels:
    app: anytype-consensusnode
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: anytype-consensusnode
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: anytype-consensusnode
    spec:
      initContainers:
        - name: wait-for-coordinator
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z anytype-coordinator.app-anytype.svc 4001; do
                echo "waiting for coordinator..."
                sleep 2
              done
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      containers:
        - name: consensusnode
          image: ghcr.io/anyproto/any-sync-consensusnode:v0.7.2
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /config/config.yml
          ports:
            - name: grpc
              containerPort: 4002
              protocol: TCP
            - name: quic
              containerPort: 4012
              protocol: UDP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: networkstore
              mountPath: /networkStore
      volumes:
        - name: config
          secret:
            secretName: anytype-consensusnode-config
        - name: networkstore
          persistentVolumeClaim:
            claimName: anytype-consensusnode-networkstore
      dnsConfig:
        options:
          - name: ndots
            value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: anytype-consensusnode
  namespace: app-anytype
spec:
  type: ClusterIP
  selector:
    app: anytype-consensusnode
  ports:
    - name: grpc
      port: 4002
      targetPort: grpc
      protocol: TCP
    - name: quic
      port: 4012
      targetPort: 4012
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: anytype-consensusnode-ts
  namespace: app-anytype
  labels:
    tailscale.com/proxy-class: privileged-proxy
  annotations:
    tailscale.com/hostname: anytype-consensus
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app: anytype-consensusnode
  ports:
    - name: grpc
      port: 4002
      targetPort: grpc
      protocol: TCP
    - name: quic
      port: 4012
      targetPort: 4012
      protocol: UDP
