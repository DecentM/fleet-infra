apiVersion: apps/v1
kind: Deployment
metadata:
  name: anytype-heart-server
  namespace: app-anytype
  labels:
    app: anytype-heart-server
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: anytype-heart-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: anytype-heart-server
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: client-config
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: client-config
          secret:
            secretName: anytype-client-config
      dnsConfig:
        options:
          - name: ndots
            value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: anytype-heart-server
  namespace: app-anytype
spec:
  type: ClusterIP
  selector:
    app: anytype-heart-server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
