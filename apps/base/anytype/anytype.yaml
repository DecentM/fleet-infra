apiVersion: v1
kind: Service
metadata:
  name: anytype
  namespace: app-anytype
spec:
  selector:
    app: anytype
  ports:
    - protocol: TCP
      name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anytype
  namespace: app-anytype
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: anytype
  strategy:
    type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
  template:
    metadata:
      labels:
        app: anytype
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: write-config
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /home/anytype/.anytype
              printf '{"accountKey":"%s"}' "$ANYTYPE_ACCOUNT_KEY" \
                > /home/anytype/.anytype/config.json
          env:
            - name: ANYTYPE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: anytype-secrets
                  key: ANYTYPE_ACCOUNT_KEY
          volumeMounts:
            - mountPath: /home/anytype
              name: anytype-config
      containers:
        - name: anytype
          image: ghcr.io/wellcaffeinated/anytype-docker:1.0.2
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          envFrom:
            - configMapRef:
                name: anytype-config
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - mountPath: /data
              name: anytype-data
            - mountPath: /home/anytype
              name: anytype-config
      volumes:
        - name: anytype-data
          persistentVolumeClaim:
            claimName: anytype-data
        - name: anytype-config
          emptyDir: {}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anytype-data
  namespace: app-anytype
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn-local
