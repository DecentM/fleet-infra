apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: whoami-decentm
  namespace: app-whoami
subjects:
  - name: whoami
    spec:
      fqdn: whoami.decentm.com
      protocol: http
      target: http://traefik.traefik-system.svc:8000
tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-decentm
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami
  namespace: app-whoami

spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`whoami.cluster.arpa`)
      kind: Rule
      middlewares:
        - name: authelia-forwardauth
          namespace: app-authelia
      services:
        - name: whoami
          port: http
  tls:
    secretName: whoami-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: whoami-tls
  namespace: app-whoami
spec:
  secretName: whoami-tls
  duration: 672h # 28d
  renewBefore: 168h # 7d
  issuerRef:
    name: custom-ca-cluster-issuer
    kind: ClusterIssuer
  commonName: "whoami.cluster.arpa"
  dnsNames:
    - "whoami.cluster.arpa"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-public
  namespace: app-whoami
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`whoami.decentm.com`)
      kind: Rule
      services:
        - name: whoami
          port: 8080
