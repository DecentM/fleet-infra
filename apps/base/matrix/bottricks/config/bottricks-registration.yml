# Bottricks Appservice Registration
# This file must be registered with Synapse in homeserver.yaml under app_service_config_files
id: bottricks
url: http://bottricks.appservice.app-matrix.svc:9993
as_token: ${BOTTRICKS_AS_TOKEN}
hs_token: ${BOTTRICKS_HS_TOKEN}
sender_localpart: bottricks
rate_limited: false

