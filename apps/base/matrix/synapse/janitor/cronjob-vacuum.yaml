apiVersion: batch/v1
kind: CronJob
metadata:
  name: synapse-vacuum
  namespace: app-matrix
  labels:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/component: vacuum
    app.kubernetes.io/part-of: matrix
spec:
  schedule: "0 7 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: synapse
        app.kubernetes.io/component: vacuum
        app.kubernetes.io/part-of: matrix
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: synapse
            app.kubernetes.io/component: vacuum
            app.kubernetes.io/part-of: matrix
        spec:
          serviceAccountName: synapse-janitor
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: cadance
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          containers:
            - name: vacuum
              image: ghcr.io/cloudnative-pg/postgresql:16.13
              command:
                - psql
                - -c
                - "VACUUM FULL;"
              env:
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: matrix-db-app
                      key: user
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: matrix-db-app
                      key: password
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: matrix-db-app
                      key: dbname
                - name: PGHOST
                  value: matrix-db-rw.app-matrix.svc
                - name: PGPORT
                  value: "5432"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 768Mi
