apiVersion: batch/v1
kind: CronJob
metadata:
  name: synapse-foreign-room-purge
  namespace: app-matrix
  labels:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/component: foreign-room-purge
    app.kubernetes.io/part-of: matrix
spec:
  schedule: "0 4 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: synapse
        app.kubernetes.io/component: foreign-room-purge
        app.kubernetes.io/part-of: matrix
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: synapse
            app.kubernetes.io/component: foreign-room-purge
            app.kubernetes.io/part-of: matrix
        spec:
          serviceAccountName: synapse-janitor
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: cadance
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
          volumes:
            - name: scripts
              configMap:
                name: synapse-janitor-scripts
                defaultMode: 0755
          containers:
            - name: foreign-room-purge
              image: ghcr.io/decentm/curl-jq:sha-1a12764
              imagePullPolicy: IfNotPresent
              command: ["sh", "/scripts/foreign-room-purge.sh"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              env:
                - name: POLL_INTERVAL
                  value: "5"
                - name: POLL_TIMEOUT
                  value: "300"
                - name: SYNAPSE_ADMIN_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: synapse-secrets
                      key: admin-access-token
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 512Mi
