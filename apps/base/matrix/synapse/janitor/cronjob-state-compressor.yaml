# Synapse state compressor - compresses state groups to reduce database size
# Uses direct CNPG service (not PgBouncer) as the compressor needs direct DB access
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: synapse-state-compressor
  namespace: app-matrix
  labels:
    app.kubernetes.io/name: synapse
    app.kubernetes.io/component: state-compressor
    app.kubernetes.io/part-of: matrix
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: synapse
        app.kubernetes.io/component: state-compressor
        app.kubernetes.io/part-of: matrix
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: synapse
            app.kubernetes.io/component: state-compressor
            app.kubernetes.io/part-of: matrix
        spec:
          serviceAccountName: synapse-janitor
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: cadance
          securityContext:
            runAsUser: 991
            runAsGroup: 991
          containers:
            - name: state-compressor
              image: ghcr.io/matrix-org/rust-synapse-compress-state:latest
              command:
                - synapse_auto_compressor
              args:
                - "-p"
                - "postgresql://$(DB_USER):$(DB_PASSWORD)@matrix-db-rw.app-matrix.svc:5432/$(DB_NAME)"
                - "-c"
                - "500"
                - "-n"
                - "100"
              env:
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: matrix-db-app
                      key: user
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: matrix-db-app
                      key: password
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: matrix-db-app
                      key: dbname
                - name: RUST_LOG
                  value: info
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
