apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: synapse-tunnel
  namespace: app-matrix
subjects:
  # Matrix Synapse (routed via Traefik IngressRoute)
  - name: synapse
    spec:
      fqdn: matrix.borooka.ee
      protocol: http
      target: http://traefik.traefik-system.svc:8000

tunnelRef:
  kind: ClusterTunnel
  name: cluster-tunnel-borooka
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: synapse
  namespace: app-matrix
spec:
  entryPoints:
    - tunnel
  routes:
    # --- Priority 700: MAS auth endpoints ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/client/(r0|v3)/(login|logout|refresh)`)
      kind: Rule
      priority: 700
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: mas
          port: 8080
          serversTransport: synapse-transport-default

    # --- Priority 600: client sync (exact) ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/client/(r0|v3)/sync$`)
      kind: Rule
      priority: 600
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-client-reader
          port: 8083
          serversTransport: synapse-transport-sync

    # --- Priority 600: client events (exact) ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/client/(r0|v3)/events$`)
      kind: Rule
      priority: 600
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-client-reader
          port: 8083
          serversTransport: synapse-transport-sync

    # --- Priority 590: initialSync (exact) ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/client/(r0|v3)/initialSync$`)
      kind: Rule
      priority: 590
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-client-reader
          port: 8083
          serversTransport: synapse-transport-sync

    # --- Priority 590: room initialSync ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/client/(r0|v3)/rooms/[^/]+/initialSync$`)
      kind: Rule
      priority: 590
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-client-reader
          port: 8083
          serversTransport: synapse-transport-sync

    # --- Priority 500: federation send ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/federation/v1/send/`)
      kind: Rule
      priority: 500
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-federation-reader
          port: 8083
          serversTransport: synapse-transport-default

    # --- Priority 490: federation send_join / send_leave / send_knock ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/federation/(v1|v2)/(send_join|send_leave|send_knock)/`)
      kind: Rule
      priority: 490
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-federation-reader
          port: 8083
          serversTransport: synapse-transport-federation-join

    # --- Priority 480: federation backfill ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/federation/v1/backfill/`)
      kind: Rule
      priority: 480
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-federation-reader
          port: 8083
          serversTransport: synapse-transport-federation-backfill

    # --- Priority 480: federation get_missing_events ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/federation/v1/get_missing_events/`)
      kind: Rule
      priority: 480
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-federation-reader
          port: 8083
          serversTransport: synapse-transport-federation-backfill

    # --- Priority 465: federation openid userinfo (not implemented by federation-reader) ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/federation/v1/openid/userinfo`)
      kind: Rule
      priority: 465
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse
          port: 8008
          serversTransport: synapse-transport-default

    # --- Priority 460: federation catch-all (covers all remaining federation endpoints) ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/federation/`)
      kind: Rule
      priority: 460
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-federation-reader
          port: 8083
          serversTransport: synapse-transport-default

    # --- Priority 460: matrix key ---
    - match: Host(`matrix.borooka.ee`) && PathRegexp(`^/_matrix/key/`)
      kind: Rule
      priority: 460
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse-federation-reader
          port: 8083
          serversTransport: synapse-transport-default

    # --- Priority 1: catch-all ---
    - match: Host(`matrix.borooka.ee`)
      kind: Rule
      priority: 1
      middlewares:
        - name: synapse-buffering
          namespace: app-matrix
      services:
        - name: synapse
          port: 8008
          serversTransport: synapse-transport-default
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: synapse-buffering
  namespace: app-matrix
spec:
  buffering:
    maxRequestBodyBytes: 52428800
    memRequestBodyBytes: 1048576
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: synapse-transport-default
  namespace: app-matrix
spec:
  forwardingTimeouts:
    dialTimeout: 60s
    responseHeaderTimeout: 60s
    idleConnTimeout: 90s
  maxIdleConnsPerHost: 32
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: synapse-transport-sync
  namespace: app-matrix
spec:
  forwardingTimeouts:
    dialTimeout: 60s
    responseHeaderTimeout: 90s
    idleConnTimeout: 90s
  maxIdleConnsPerHost: 32
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: synapse-transport-initialsync
  namespace: app-matrix
spec:
  forwardingTimeouts:
    dialTimeout: 60s
    responseHeaderTimeout: 180s
    idleConnTimeout: 90s
  maxIdleConnsPerHost: 16
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: synapse-transport-federation-backfill
  namespace: app-matrix
spec:
  forwardingTimeouts:
    dialTimeout: 30s
    responseHeaderTimeout: 120s
    idleConnTimeout: 90s
  maxIdleConnsPerHost: 16
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: synapse-transport-federation-join
  namespace: app-matrix
spec:
  forwardingTimeouts:
    dialTimeout: 60s
    responseHeaderTimeout: 300s
    idleConnTimeout: 90s
  maxIdleConnsPerHost: 8
