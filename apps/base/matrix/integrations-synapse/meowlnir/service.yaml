apiVersion: v1
kind: Service
metadata:
  name: integrations-meowlnir
  namespace: app-matrix
  labels:
    app: integrations-meowlnir
    app.kubernetes.io/name: integrations-meowlnir
    app.kubernetes.io/component: moderation
    app.kubernetes.io/part-of: matrix
spec:
  type: ClusterIP
  publishNotReadyAddresses: true
  ports:
    - name: antispam
      port: 29339
      targetPort: antispam
      protocol: TCP
    - name: management
      port: 29340
      targetPort: management
      protocol: TCP
  selector:
    app: integrations-meowlnir
