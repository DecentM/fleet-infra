apiVersion: batch/v1
kind: CronJob
metadata:
  name: integrations-synapse-media-purge
  namespace: app-matrix
  labels:
    app.kubernetes.io/name: integrations-synapse
    app.kubernetes.io/component: media-purge
    app.kubernetes.io/part-of: matrix
spec:
  schedule: "0 6 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: integrations-synapse
        app.kubernetes.io/component: media-purge
        app.kubernetes.io/part-of: matrix
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: integrations-synapse
            app.kubernetes.io/component: media-purge
            app.kubernetes.io/part-of: matrix
        spec:
          serviceAccountName: integrations-synapse-janitor
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
          containers:
            - name: media-purge
              image: curlimages/curl:8.18.0
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  set -e
                  # Calculate timestamp for 7 days ago in milliseconds
                  BEFORE_TS=$(( ($(date +%s) - 604800) * 1000 ))
                  echo "Purging remote media cache older than 7 days (before_ts=${BEFORE_TS})..."
                  curl -sf -X POST \
                    -H "Authorization: Bearer ${SYNAPSE_ADMIN_TOKEN}" \
                    "http://integrations-synapse.app-matrix.svc:8008/_synapse/admin/v1/purge_media_cache?before_ts=${BEFORE_TS}"
                  echo ""
                  # Purge local media not accessed in 30 days (keep profile images)
                  BEFORE_TS_30=$(( ($(date +%s) - 2592000) * 1000 ))
                  echo "Purging local media not accessed in 30 days (before_ts=${BEFORE_TS_30})..."
                  curl -sf -X POST \
                    -H "Authorization: Bearer ${SYNAPSE_ADMIN_TOKEN}" \
                    "http://integrations-synapse.app-matrix.svc:8008/_synapse/admin/v1/media/delete?before_ts=${BEFORE_TS_30}&keep_profiles=true"
                  echo ""
                  echo "Media purge complete."
              env:
                - name: SYNAPSE_ADMIN_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: integrations-synapse-admin-secrets
                      key: admin-access-token
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 512Mi
