# Integrations Synapse — single-process homeserver for bots and appservices
# No workers, no Redis, no MAS. Hosts meowlnir for moderation of main server rooms.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integrations-synapse
  namespace: app-matrix
  labels:
    app: integrations-synapse
    app.kubernetes.io/name: integrations-synapse
    app.kubernetes.io/component: homeserver
    app.kubernetes.io/part-of: matrix
spec:
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: integrations-synapse
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: integrations-synapse
        app.kubernetes.io/name: integrations-synapse
    spec:
      securityContext:
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z integrations-db-pooler-rw.app-matrix.svc 5432; do
                echo "Waiting for database..."
                sleep 2
              done
              echo "Database is ready"
          securityContext:
            runAsUser: 991
            runAsGroup: 991
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
        - name: config-templating
          image: oaudry/envsubst:1.6
          command:
            - sh
            - -c
            - |
              for file in /config-template/*; do
                filename=$(basename "$file")
                echo "Processing $filename..."
                envsubst < "$file" > "/config-processed/$filename"
              done

              for file in /meowlnir-template/*; do
                filename=$(basename "$file")
                echo "Processing meowlnir template: $filename..."
                envsubst < "$file" > "/config-processed/$filename"
              done

              echo "Config templating complete"
              ls -la /config-processed/
          env:
            - name: SYNAPSE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: integrations-db-app
                  key: password
            - name: SYNAPSE_REGISTRATION_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-synapse-secrets
                  key: registration-shared-secret
            - name: SYNAPSE_MACAROON_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: integrations-synapse-secrets
                  key: macaroon-secret-key
            - name: SYNAPSE_FORM_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-synapse-secrets
                  key: form-secret
            - name: MEOWLNIR_AS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: integrations-meowlnir-secrets
                  key: meowlnir_as_token
            - name: MEOWLNIR_HS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: integrations-meowlnir-secrets
                  key: meowlnir_hs_token
            - name: MEOWLNIR_ANTISPAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: integrations-meowlnir-secrets
                  key: meowlnir_as_token
            - name: SYNAPSE_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: synapse-s3-secrets
                  key: bucket-name
            - name: SYNAPSE_S3_ENDPOINT_URL
              valueFrom:
                secretKeyRef:
                  name: synapse-s3-secrets
                  key: endpoint-url
            - name: SYNAPSE_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: synapse-s3-secrets
                  key: region
            - name: SYNAPSE_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: synapse-s3-secrets
                  key: access-key-id
            - name: SYNAPSE_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: synapse-s3-secrets
                  key: secret-access-key
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config-processed
              mountPath: /config-processed
            - name: meowlnir-registration-template
              mountPath: /meowlnir-template
              readOnly: true
          securityContext:
            runAsUser: 991
            runAsGroup: 991
            allowPrivilegeEscalation: false
      containers:
        - name: synapse
          image: ghcr.io/decentm/synapse:sha-78be9cf
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            runAsUser: 991
            runAsGroup: 991
            allowPrivilegeEscalation: false
          env:
            - name: SYNAPSE_CONFIG_PATH
              value: /config/homeserver.yaml
            - name: SYNAPSE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: integrations-db-app
                  key: password
            - name: SYNAPSE_REGISTRATION_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-synapse-secrets
                  key: registration-shared-secret
            - name: SYNAPSE_MACAROON_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: integrations-synapse-secrets
                  key: macaroon-secret-key
            - name: SYNAPSE_FORM_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-synapse-secrets
                  key: form-secret
          ports:
            - name: http
              containerPort: 8008
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - name: config-processed
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
            - name: signing-key
              mountPath: /data/integrations.borooka.ee.signing.key
              subPath: integrations.borooka.ee.signing.key
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: integrations-synapse-config
        - name: config-processed
          emptyDir: {}
        - name: data
          emptyDir:
            sizeLimit: 2Gi
        - name: signing-key
          secret:
            secretName: integrations-synapse-signing-key
            items:
              - key: signing.key
                path: integrations.borooka.ee.signing.key
        - name: meowlnir-registration-template
          configMap:
            name: integrations-meowlnir-config
            items:
              - key: meowlnir-registration.yml
                path: meowlnir-registration.yml
---
apiVersion: v1
kind: Service
metadata:
  name: integrations-synapse
  namespace: app-matrix
  labels:
    app: integrations-synapse
    app.kubernetes.io/name: integrations-synapse
    app.kubernetes.io/component: homeserver
    app.kubernetes.io/part-of: matrix
    job: integrations-synapse
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8008"
    prometheus.io/path: "/_synapse/metrics"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8008
      targetPort: http
      protocol: TCP
  selector:
    app: integrations-synapse
