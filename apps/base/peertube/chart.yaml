apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: peertube
  namespace: app-peertube
spec:
  interval: 10m
  url: https://zendet.github.io/peertube-helm/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: peertube
  namespace: app-peertube
spec:
  interval: 10m
  chart:
    spec:
      chart: peertube
      version: "0.1.2"
      sourceRef:
        kind: HelmRepository
        name: peertube
        namespace: app-peertube
      interval: 10m

  valuesFrom:
    # Admin password from sealed secret
    - kind: Secret
      name: peertube-secrets
      valuesKey: admin-password
      targetPath: server.config.admin.password
    # Peertube secrets from sealed secret
    - kind: Secret
      name: peertube-secrets
      valuesKey: peertube-secret
      targetPath: server.config.secrets.peertube
    # PostgreSQL credentials from CloudNativePG secret
    - kind: Secret
      name: peertube-db-app
      valuesKey: username
      targetPath: server.externalPostgres.username
    - kind: Secret
      name: peertube-db-app
      valuesKey: password
      targetPath: server.externalPostgres.password
    - kind: Secret
      name: peertube-db-app
      valuesKey: dbname
      targetPath: server.externalPostgres.name
    - kind: Secret
      name: peertube-db-app
      valuesKey: port
      targetPath: server.externalPostgres.port

  values:
    server:
      replicas: 1

      nodeSelector:
        kubernetes.io/hostname: cadance

      container:
        image:
          registry: docker.io
          repository: chocobozzz/peertube
          tag: "v8.0.2"
          pullPolicy: IfNotPresent

        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"

        # Instance configuration via environment variables
        extraEnvVars:
          - name: PEERTUBE_INSTANCE_NAME
            valueFrom:
              configMapKeyRef:
                name: peertube-config
                key: PEERTUBE_INSTANCE_NAME
          - name: PEERTUBE_INSTANCE_SHORT_DESCRIPTION
            valueFrom:
              configMapKeyRef:
                name: peertube-config
                key: PEERTUBE_INSTANCE_SHORT_DESCRIPTION
          - name: PEERTUBE_INSTANCE_DESCRIPTION
            valueFrom:
              configMapKeyRef:
                name: peertube-config
                key: PEERTUBE_INSTANCE_DESCRIPTION
          - name: PEERTUBE_ADMIN_EMAIL
            valueFrom:
              secretKeyRef:
                name: peertube-secrets
                key: admin-email
          # OIDC Plugin Configuration (for Authelia integration)
          - name: PT_INITIAL_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: peertube-secrets
                key: admin-password
          # S3 Object Storage credentials
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: peertube-s3-secrets
                key: access-key-id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: peertube-s3-secrets
                key: secret-access-key
          - name: AWS_ENDPOINT_URL
            valueFrom:
              secretKeyRef:
                name: peertube-s3-secrets
                key: endpoint
          - name: AWS_REGION
            valueFrom:
              secretKeyRef:
                name: peertube-s3-secrets
                key: region
          - name: S3_BUCKET
            valueFrom:
              secretKeyRef:
                name: peertube-s3-secrets
                key: bucket

      persistence:
        enabled: false

      externalPostgres:
        hostname: "peertube-db-rw.app-peertube.svc.cluster.local"
        pool:
          max: 10

      externalRedis:
        hostname: "peertube-redis.app-peertube.svc.cluster.local"
        port: 6379
        db: 0

      config:
        createConfigMap: true
        raw: |
          listen:
            hostname: '0.0.0.0'
            port: 9000
          trust_proxy:
            - 'loopback'
            - '10.0.0.0/8'
            - '173.245.48.0/20'
            - '103.21.244.0/22'
            - '103.22.200.0/22'
            - '103.31.4.0/22'
            - '141.101.64.0/18'
            - '108.162.192.0/18'
            - '190.93.240.0/20'
            - '188.114.96.0/20'
            - '197.234.240.0/22'
            - '198.41.128.0/17'
            - '162.158.0.0/15'
            - '104.16.0.0/13'
            - '104.24.0.0/14'
            - '172.64.0.0/13'
            - '131.0.72.0/22'
          webserver:
            https: false
            hostname: '0.0.0.0'
            port: 9000
          log:
            level: info
          open_telemetry:
            metrics:
              enabled: false
          live:
            enabled: true
            rtmp:
              enabled: true
              hostname: 0.0.0.0
              port: 1935
            rtmps:
              enabled: false
          # Object Storage (S3) Configuration
          object_storage:
            enabled: true
            upload_acl:
              public: 'public-read'
              private: 'private'
            proxy:
              proxify_private_files: true
            max_upload_part: 100MB
            max_request_attempts: 3
            streaming_playlists:
              prefix: 'streaming-playlists/'
              store_live_streams: false
            web_videos:
              prefix: 'web-videos/'
            user_exports:
              prefix: 'user-exports/'
            original_video_files:
              prefix: 'original-video-files/'
            captions:
              prefix: 'captions/'
          transcoding:
            enabled: true
            threads: 2
            concurrency: 1
          video_transcription:
            enabled: false

      service:
        type: ClusterIP
        port: 9000

      ingress:
        enabled: false  # We use Traefik IngressRoute instead

      certificate:
        enabled: false  # We use cert-manager with Traefik

      liveService:
        create: false  # We'll handle RTMP separately if needed

      metricsService:
        create: false

      serviceMonitor:
        enabled: false

    runner:
      enabled: false  # Can be enabled later for transcoding
