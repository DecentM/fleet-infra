apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: peertube-db
  namespace: app-peertube
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.13
  storage:
    storageClass: longhorn-local
    size: 10Gi
  monitoring:
    enablePodMonitor: true
  bootstrap:
    initdb:
      database: peertube
      owner: peertube
