user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # CoreDNS ClusterIP - required because our proxy_pass URL includes a
    # variable ($webfinger_resource), which forces nginx to resolve the
    # upstream dynamically at request time instead of at startup. Without a
    # resolver directive nginx fails with "host not found in upstream".
    resolver 10.96.0.10 valid=10s ipv6=off;

    # Rewrite @decentm.com -> @videos.decentm.com in the webfinger resource
    # param. Captures the local part before @, rebuilds with the PeerTube
    # hostname. Falls back to the original value for non-matching resources.
    map $arg_resource $webfinger_resource {
        ~^acct:([^@]+)@decentm\.com$  "acct:$1@videos.decentm.com";
        default                        $arg_resource;
    }

    server {
        listen 8000;
        server_name _;

        location = /.well-known/host-meta {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Content-Type "application/xml" always;
            return 200 '<?xml version="1.0" encoding="UTF-8"?>\n<XRD xmlns="http://docs.oasis-open.org/ns/xri/xrd-1.0">\n  <Link rel="lrdd" type="application/jrd+json" template="https://decentm.com/.well-known/webfinger?resource={uri}"/>\n</XRD>';
        }

        location = /.well-known/webfinger {
            proxy_pass http://peertube.app-peertube.svc.cluster.local:9000/.well-known/webfinger?resource=$webfinger_resource;
            proxy_set_header Host videos.decentm.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Only the subject field uses the acct:user@domain format - aliases
            # and links use HTTPS URLs, so `@videos.decentm.com"` only appears
            # in the subject. sub_filter_once keeps this bounded even if that
            # assumption ever changes upstream.
            sub_filter '@videos.decentm.com"' '@decentm.com"';
            sub_filter_once on;
            sub_filter_types application/jrd+json application/json;

            add_header Access-Control-Allow-Origin "*" always;
        }

        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "healthy\n";
        }
    }
}
